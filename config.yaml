# AI Token Speed Tester Configuration
# API密钥支持环境变量替换，格式: ${ENV_VAR_NAME}

api_keys:
  anthropic: "${ANTHROPIC_API_KEY}"
  anthropic_lite: "${ANTHROPIC_LITE_API_KEY}"
  volcengine: "${VOLCENGINE_API_KEY}"

base_urls:
  anthropic: "${ANTHROPIC_BASE_URL}"
  anthropic_lite: "${ANTHROPIC_LITE_BASE_URL}"
  volcengine: "${VOLCENGINE_BASE_URL}"

models:
  anthropic:
    - name: "qwen3.5-plus (Pro)"
      api_name: "qwen3.5-plus"
      enabled: false
    - name: "glm-5 (Pro)"
      api_name: "glm-5"
      enabled: false

  anthropic_lite:
    - name: "qwen3.5-plus (Lite)"
      api_name: "qwen3.5-plus"
      enabled: false
    - name: "glm-5 (Lite)"
      api_name: "glm-5"
      enabled: false
    - name: "glm-4.7"
      api_name: "glm-4.7"
      enabled: false
    - name: "MiniMax-M2.5"
      api_name: "MiniMax-M2.5"
      enabled: false

  volcengine:
    - name: "Doubao-Seed-2.0-pro"
      api_name: "Doubao-Seed-2.0-pro"
      enabled: true
    - name: "Doubao-Seed-2.0-Code"
      api_name: "Doubao-Seed-2.0-Code"
      enabled: false

test_settings:
  iterations: 3
  timeout: 120
  max_tokens: 1024